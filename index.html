const IMPACTS = ["High", "High", "Medium", "Medium", "Medium", "Low"];
const COSTS = ["$", "$$", "$$$"];

const SUBTASK_BANK = {

    "Identify and engage stakeholders",

    "Design the program rules and eligibility",

const STATUSES = ["todo", "doing", "blocked", "done"];
const STATUS_LABEL = { todo: "To-do", doing: "In progress", blocked: "Blocked", done: "Done" };
const STATUS_NEXT = { todo: "doing", doing: "done", done: "blocked", blocked: "todo" };

/* ---------- Generate exactly 1000 solutions ---------- */
const TOTAL = 1000;
function generate() {
  const out = [];
  const seenTitles = new Set();
  let i = 0;
  // round-robin across categories so the list feels balanced
  let guard = 0;
  while (out.length < TOTAL && guard < 100000) {
    guard++;
    const cat = CATEGORIES[i % CATEGORIES.length];
    i++;
    const id = out.length + 1;
    const rng = mulberry32(id * 2654435761 + 12345);
    const stem = pick(rng, cat.stems);
    const scope = pick(rng, SCOPES);
    let title = scope ? `${stem} ${scope}` : stem;
    // ensure uniqueness; if collision, append a differentiator
    let title2 = title;
    let bump = 2;
    while (seenTitles.has(title2)) { title2 = `${title} (phase ${bump++})`; }
    seenTitles.add(title2);

    const impact = pick(rng, IMPACTS);
    const cost = pick(rng, COSTS);
    const nSubs = 3 + Math.floor(rng() * 3); // 3..5
    const bank = SUBTASK_BANK.generic.slice();
    const subs = [];
    for (let s = 0; s < nSubs; s++) {
      const idx = Math.floor(rng() * bank.length);
      const text = bank.splice(idx, 1)[0] || `Implementation step ${s + 1}`;
      // deterministic seeded default status, weighted toward not-done
      const r = rng();
      let st = "todo";
      if (r > 0.92) st = "done";
      else if (r > 0.78) st = "blocked";
      else if (r > 0.5) st = "doing";
      subs.push({ text, status: st });
    }
    out.push({
      id,
      cat: cat.name,
      catKey: cat.key,
      color: cat.color,
      title: title2,
      impact,
      cost,
      subs
    });
  }
  return out;
}

const SOLUTIONS = generate();

/* ---------- Persistence ---------- */
const STORE_KEY = "voltdown_status_v1";
function loadOverrides() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }
  catch { return {}; }
}
function saveOverrides(o) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(o)); } catch {}
}
let OVERRIDES = loadOverrides();

function subStatus(solId, subIdx, baseStatus) {
  const k = solId + ":" + subIdx;
  return (OVERRIDES[k] != null) ? OVERRIDES[k] : baseStatus;
}
function setSubStatus(solId, subIdx, status) {
  OVERRIDES[solId + ":" + subIdx] = status;
  saveOverrides(OVERRIDES);
}

/* ---------- Derived helpers ---------- */
function solStatuses(sol) {
  return sol.subs.map((s, idx) => subStatus(sol.id, idx, s.status));
}
function solProgress(sol) {
  const st = solStatuses(sol);
  const done = st.filter(x => x === "done").length;
  return { done, total: st.length, pct: Math.round((done / st.length) * 100), st };
}

const countEl = document.getElementById("count");

function matches(sol) {
  if (activeCat && sol.catKey !== activeCat) return false;
  const { st } = solProgress(sol);
  if (statusFilter === "done" && !st.every(x => x === "done")) return false;
  if (statusFilter && statusFilter !== "done" && !st.includes(statusFilter)) return false;
  if (searchQ) {
    const hay = (sol.title + " " + sol.cat + " " + sol.subs.map(s => s.text).join(" ")).toLowerCase();
    if (!hay.includes(searchQ)) return false;
  }
  return true;
}

function filteredSorted() {
  let list = SOLUTIONS.filter(matches);
  if (sortMode === "progress-asc") list.sort((a, b) => solProgress(a).pct - solProgress(b).pct || a.id - b.id);
  else if (sortMode === "progress-desc") list.sort((a, b) => solProgress(b).pct - solProgress(a).pct || a.id - b.id);
  else if (sortMode === "impact") {
    const w = { High: 0, Medium: 1, Low: 2 };
    list.sort((a, b) => w[a.impact] - w[b.impact] || a.id - b.id);
  }
  return list;
}

function cardHTML(sol) {
  const p = solProgress(sol);
  const subsHTML = sol.subs.map((s, idx) => {
    const st = p.st[idx];
    return `<div class="sub ${st === "done" ? "done" : ""}">
      <span class="stxt">${escapeHTML(s.text)}</span>
      <button class="status-btn s-${st}" data-sol="${sol.id}" data-sub="${idx}">${STATUS_LABEL[st]}</button>
    </div>`;
  }).join("");
  return `<div class="card" data-id="${sol.id}">
    <div class="top">
      <span class="cat" style="color:${sol.color}">${escapeHTML(sol.cat)}</span>
      <span class="idtag">#${String(sol.id).padStart(4, "0")}</span>
    </div>
    <div class="title">${escapeHTML(sol.title)}</div>
    <div class="meta">
      <span class="pill impact-${sol.impact}">${sol.impact} impact</span>
      <span class="pill cost">${sol.cost}</span>
      <div class="progress-mini"><span style="width:${p.pct}%"></span></div>
      <span class="idtag">${p.done}/${p.total}</span>
    </div>
    <div class="subs">${subsHTML}</div>
    <button class="toggle">▸ Show ${sol.subs.length} subtasks</button>
  </div>`;
}

function escapeHTML(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function render() {
  const list = filteredSorted();
  countEl.textContent = `${list.length.toLocaleString()} of ${TOTAL.toLocaleString()} shown`;
  const slice = list.slice(0, renderLimit);
  grid.innerHTML = slice.map(cardHTML).join("");
  emptyEl.style.display = list.length === 0 ? "block" : "none";
  window._fullCount = list.length;
}

/* ---------- Stats ---------- */
function renderStats() {
  let subTotal = 0, done = 0, doing = 0, blocked = 0, todo = 0, fullyDone = 0;
  for (const sol of SOLUTIONS) {
    const st = solStatuses(sol);
    subTotal += st.length;
    let allDone = true;
    for (const s of st) {
      if (s === "done") done++; else allDone = false;
      if (s === "doing") doing++;
      if (s === "blocked") blocked++;
      if (s === "todo") todo++;
    }
    if (allDone) fullyDone++;
  }
  const pct = Math.round((done / subTotal) * 100);
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="n">${TOTAL.toLocaleString()}</div><div class="l">Solutions</div></div>
    <div class="stat"><div class="n">${subTotal.toLocaleString()}</div><div class="l">Subtasks</div></div>
    <div class="stat"><div class="n">${fullyDone.toLocaleString()}</div><div class="l">Fully complete</div></div>
    <div class="stat"><div class="n">${pct}%</div><div class="l">Subtasks done</div>
      <div class="bar">
        <span style="width:${done/subTotal*100}%;background:var(--green)"></span>
        <span style="width:${doing/subTotal*100}%;background:var(--amber)"></span>
        <span style="width:${blocked/subTotal*100}%;background:var(--red)"></span>
        <span style="width:${todo/subTotal*100}%;background:var(--grey)"></span>
      </div>
    </div>
    <div class="stat"><div class="n">${blocked.toLocaleString()}</div><div class="l">Blocked subtasks</div></div>`;
}

/* ---------- Category chips ---------- */
function renderChips() {
  const counts = {};
  for (const s of SOLUTIONS) counts[s.catKey] = (counts[s.catKey] || 0) + 1;
  const el = document.getElementById("cats");
  let html = `<span class="chip ${activeCat === "" ? "active" : ""}" data-cat="">All (${TOTAL})</span>`;
  html += CATEGORIES.map(c =>
    `<span class="chip ${activeCat === c.key ? "active" : ""}" data-cat="${c.key}">${c.name} (${counts[c.key] || 0})</span>`
  ).join("");
  el.innerHTML = html;
}

/* ---------- Events ---------- */
document.getElementById("cats").addEventListener("click", e => {
  const chip = e.target.closest(".chip"); if (!chip) return;
  activeCat = chip.dataset.cat; renderLimit = 60;
  renderChips(); render();
});
document.getElementById("search").addEventListener("input", e => {
  searchQ = e.target.value.trim().toLowerCase(); renderLimit = 60; render();
});
document.getElementById("statusFilter").addEventListener("change", e => {
  statusFilter = e.target.value; renderLimit = 60; render();
});
document.getElementById("sort").addEventListener("change", e => {
  sortMode = e.target.value; renderLimit = 60; render();
});
function currentRows() {
  // one row per subtask, reflecting any saved status overrides
  const rows = [];
  for (const sol of SOLUTIONS) {
    sol.subs.forEach((s, idx) => {
      rows.push({
        solution_id: sol.id,
        category: sol.cat,
        solution: sol.title,
        impact: sol.impact,
        cost: sol.cost,
        subtask_index: idx + 1,
        subtask: s.text,
        status: STATUS_LABEL[subStatus(sol.id, idx, s.status)]
      });
    });
  }
  return rows;
}
function download(filename, text, type) {
  const blob = new Blob([text], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
document.getElementById("exportJson").addEventListener("click", () => {
  const data = SOLUTIONS.map(sol => ({
    id: sol.id, category: sol.cat, title: sol.title, impact: sol.impact, cost: sol.cost,
    subtasks: sol.subs.map((s, idx) => ({ task: s.text, status: STATUS_LABEL[subStatus(sol.id, idx, s.status)] }))
  }));
  download("voltdown-solutions.json", JSON.stringify(data, null, 2), "application/json");
});
document.getElementById("exportCsv").addEventListener("click", () => {
  const rows = currentRows();
  const cols = ["solution_id", "category", "solution", "impact", "cost", "subtask_index", "subtask", "status"];
  const esc = v => `"${String(v).replace(/"/g, '""')}"`;
  const csv = [cols.join(",")].concat(rows.map(r => cols.map(c => esc(r[c])).join(","))).join("\r\n");
  download("voltdown-solutions.csv", csv, "text/csv");
});
document.getElementById("reset").addEventListener("click", () => {
  if (confirm("Reset all status changes saved on this device?")) {
    OVERRIDES = {}; saveOverrides(OVERRIDES); render(); renderStats();
  }
});

grid.addEventListener("click", e => {
  const toggle = e.target.closest(".toggle");
  if (toggle) {
    const card = toggle.closest(".card");
    card.classList.toggle("open");
    const sol = SOLUTIONS[+card.dataset.id - 1];
    toggle.textContent = card.classList.contains("open")
      ? "▾ Hide subtasks" : `▸ Show ${sol.subs.length} subtasks`;
    return;
  }
  const btn = e.target.closest(".status-btn");
  if (btn) {
    const solId = +btn.dataset.sol, subIdx = +btn.dataset.sub;
    const sol = SOLUTIONS[solId - 1];
    const cur = subStatus(solId, subIdx, sol.subs[subIdx].status);
    const next = STATUS_NEXT[cur];
    setSubStatus(solId, subIdx, next);
    // update this button
    btn.className = "status-btn s-" + next;
    btn.textContent = STATUS_LABEL[next];
    btn.closest(".sub").classList.toggle("done", next === "done");
    // update mini progress on the card
    const p = solProgress(sol);
    const card = btn.closest(".card");
    card.querySelector(".progress-mini > span").style.width = p.pct + "%";
    card.querySelector(".meta .idtag").textContent = `${p.done}/${p.total}`;
    renderStats();
  }
});

/* ---------- Infinite scroll ---------- */
const sentinel = document.getElementById("sentinel");
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && renderLimit < (window._fullCount || 0)) {
    renderLimit += 60; render();
  }
}, { rootMargin: "600px" }).observe(sentinel);

/* ---------- Init ---------- */
renderChips();
renderStats();
render();
</script>
</body>
</html>
